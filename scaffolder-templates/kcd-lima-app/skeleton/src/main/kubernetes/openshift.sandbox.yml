kind: Route
apiVersion: route.openshift.io/v1
metadata:
  name: kcd-lima-app
spec:
  to:
    kind: Service
    name: kcd-lima-app
    weight: 100
  port:
    targetPort: 8443
  tls:
    termination: passthrough
    insecureEdgeTerminationPolicy: Redirect
    wildcardPolicy: None
---
kind: Deployment
apiVersion: apps.openshift.io/v1
metadata:
  name: kcd-lima-app
spec:
  template:
    spec:
      volumes:
        - name: https-secret
          secret:
            secretName: https-secret
            defaultMode: 420
      containers:
        - name: kcd-lima-app
          volumeMounts:
            - name: https-secret
              readOnly: true
              mountPath: /mnt/https-secret
